run:
  run_id: "auto"
  description: "Bavaria municipal deep-dive crawl (High-Recall)"
  code_version: "git-hash"

limits:
  max_depth: 6
  max_pages_per_muni: 2000
  max_pages_per_domain: 2000 # GESTEIGERT: Darf nicht kleiner sein als max_pages_per_muni!
  max_pages_per_external_domain: 500
  max_file_size_mb: 200 # ANGEPASST: Synchronisiert mit engine.py (200MB für dicke PDF-Karten)
  max_runtime_minutes_per_muni: 300
  max_retries: 3

fetching:
  user_agent: "KIT-ClimatePolicyCrawler/1.0 (research)"
  respect_robots_txt: false
  global_concurrency: 100
  per_domain_concurrency: 4
  min_delay_seconds_per_domain: 0.2 # 0.1 (10 req/s) löst oft WAF-Blockaden aus, 0.2 (5 req/s) ist der Sweetspot
  request_timeout_seconds: 30
  retry_backoff_seconds: [5, 30, 60]
  max_redirects: 15
  accept_language: "de-DE,de;q=0.9,en;q=0.7"

content:
  allow_html: true
  allow_pdf: true
  allow_docx: true
  allow_xlsx: true
  allow_odt: true
  # KORRIGIERT: Muss ein sauberes Array sein!
  block_extensions:
    [
      "jpg",
      "jpeg",
      "png",
      "gif",
      "webp",
      "mp4",
      "mp3",
      "zip",
      "rar",
      "7z",
      "exe",
      "svg",
      "ico",
      "css",
      "js",
      "woff",
      "woff2",
      "ttf",
      "eot",
    ]

canonicalization:
  strip_fragment: true
  normalize_trailing_slash: true
  drop_query_prefixes: ["utm_", "pk_"]
  drop_query_keys:
    [
      "fbclid",
      "gclid",
      "session",
      "jsessionid",
      "sid",
      "phpsessid",
      "msclkid",
      "search",
    ]

traps:
  block_path_patterns:
    - "/suche"
    - "/search"
    - "/tag/"
    - "/calendar"
    - "/veranstaltungen"
    - "/events"
    - "/bilder"
    - "/fotos"
    - "/video"
    # NEU: Die tödlichen RIS-Kalender-Schleifen
    - "monat="
    - "jahr="
    - "month="
    - "year="
    - "print="
    - "ansicht=druck"
  pagination_tokens:
    - "page="
    - "/page/"
    - "offset="
    - "start="
    - "p="
    - "seite="
    - "paged="
  max_pagination_depth: 10

seeding:
  use_homepage: true
  parse_robots_for_sitemaps: true
  use_sitemap_xml: true
  parse_nav_links_depth: 3
  allow_subdomains: true
  seed_additional_paths:
    - "/klima"
    - "/klimaschutz"
    - "/energie"
    - "/waermeplanung"
    - "/umwelt"
    - "/mobilitaet"
    - "/verkehr"
    - "/bauen"
    - "/foerderung"
    - "/foerderprogramme"
    - "/haushalt"
    - "/ratsinfo"
    - "/bekanntmachungen"

frontier:
  mode: "priority"
  min_priority_to_enqueue: -500
  high_priority_threshold: 10

keywords:
  positive:
    - "klima"
    - "klimaschutz"
    - "energie"
    - "co2"
    - "thg"
    - "wärme"
    - "waerme"
    - "wärmeplanung"
    - "solar"
    - "pv"
    - "photovoltaik"
    - "wind"
    - "förder"
    - "foerder"
    - "zuschuss"
    - "mittel"
    - "finanzierung"
    - "haushalt"
    - "investition"
    - "nki"
    - "kfw"
    - "bafa"
    - "eu-mittel"
    - "efre"
    - "beschluss"
    - "vorlage"
    - "protokoll"
  negative:
    - "impressum"
    - "datenschutz"
    - "karriere"
    - "stellenangebote"
    - "sport"
    - "jubiläum"
    - "museum"
    - "tourismus"

storage:
  state_db: "crawler/data/db/crawl.sqlite"
  municipalities_db: "crawler/data/db/municipalities.sqlite"
  raw_root: "crawler/data/raw"
  store_raw_html: true
  store_raw_pdf: true
  store_raw_docx: true
  hash_raw_sha256: true
  store_headers: true
  compress_raw: true

logging:
  level: "INFO"
  log_dir: "crawler/logs"
  log_sqlite_errors: true
  log_failed_urls: true
